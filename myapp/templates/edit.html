
{% extends 'base.html' %}

{% block title %}Edit User{% endblock %}

{% block content %}
<div class="w-50 m-auto p-4 bg-light">
    <h1 class="text-center bg-info">Edit User</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Update User</button>
    </form>
</div>
{% endblock %}
