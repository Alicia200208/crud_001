
{% extends 'base.html' %}

{% block title %}Confirm Delete{% endblock %}

{% block content %}
<div class='text-center'>
    <div class="col-sm-6 badge-warning" style="margin:0 auto; border:1px; border-radius:10px; padding:10px;">
        <h1 class="bg-primary">Are you sure you want to delete this user?</h1>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Confirm</button>
            <a href="{% url 'user_list' %}" class="btn btn-success">Back</a>
        </form>
    </div>
</div>
{% endblock %}
