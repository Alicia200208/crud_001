{% extends 'base.html' %}

{% block title %}User Details{% endblock %}

{% block content %}
<div class="container-fluid my-5">
    <div class="w-50 m-auto p-4 bg-info">
        <h2 class="text-center mt-4">User Details</h2>
        <table class="table bg-white">
            <tr>
                <th>Photo</th>
                <td><img src="{{ user.photo.url }}" class="rounded d-block" height="100" width="120"></td>
            </tr>
            <tr>
                <th>User name</th>
                <td>{{ user.name }}</td>
            </tr>
            <tr>
                <th>Email</th>
                <td>{{ user.email }}</td>
            </tr>
            <tr>
                <th>Password</th>
                <td>{{ user.password }}</td>
            </tr>
            <tr>
                <th>Mobile Number</th>
                <td>{{ user.mobile_number }}</td>
            </tr>
            <tr>
                <th>Date of Birth</th>
                <td>{{ user.date_of_birth }}</td>
            </tr>
        </table>
    </div>
    <div class="text-center">
        <a href="{% url 'user_list' %}" class="btn btn-success">Back</a>
    </div>
</div>
{% endblock %}
